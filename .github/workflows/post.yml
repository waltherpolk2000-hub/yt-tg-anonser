name: yt-to-tg

on:
  schedule:
    - cron: "2-59/5 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [tick]

permissions:
  contents: write

jobs:
  poll-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests feedparser

      - name: Run script
        env:
          YT_PLAYLIST_ID: ${{ secrets.YT_PLAYLIST_ID }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python post.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status --porcelain seen.json) ]]; then
            git add seen.json
            git commit -m "chore: update seen state"
            git push
          else
            echo "No state changes to commit."
          fi
